{% extends 'dashboard/base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-5">

        <div class="card shadow">

            <div class="card-body p-4">

                <h3 class="text-center mb-4">

                    Вход в систему

                </h3>

                <form method="post">

                    {% csrf_token %}

                    {% for field in form %}

                    <div class="mb-3">

                        <label class="form-label">

                            {{ field.label }}

                        </label>

                        {{ field }}

                        {% if field.errors %}
                        <div class="text-danger small">

                            {{ field.errors }}

                        </div>
                        {% endif %}

                    </div>

                    {% endfor %}

                    <button
                            type="submit"
                            class="btn btn-primary w-100">

                        Войти

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
