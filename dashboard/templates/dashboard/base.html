<!DOCTYPE html>
{% load static %}
<html lang="ru" data-bs-theme="light">

<head>

    <meta charset="utf-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title>СИНХРА</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
          rel="stylesheet">

    <style>

        :root {

            --sidebar-width: 270px;

            --primary-color: #153A5B;
            --primary-dark: #102c45;

            --sidebar-bg: linear-gradient(180deg, #102132 0%, #0b1724 100%);
            --sidebar-hover: rgba(255, 255, 255, 0.08);
            --sidebar-active: rgba(255, 255, 255, 0.14);

            --page-bg: #f4f7fb;
            --card-bg: #ffffff;

            --text-main: #1f2937;
            --text-muted: #6b7280;

            --border-color: #e5e7eb;

            --shadow-sm: 0 2px 8px rgba(0, 0, 0, .05);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, .08);

            --radius-lg: 18px;
            --radius-md: 14px;
            --radius-sm: 10px;
        }

        [data-bs-theme="dark"] {
            --topbar-bg: rgba(10, 16, 27, .72);
            --page-bg: #0a101b;
            --card-bg: #111827;

            --text-main: #f3f4f6;
            --text-muted: #9ca3af;

            --border-color: rgba(255, 255, 255, .06);

            --sidebar-bg: #0b1220;
            --sidebar-hover: rgba(255, 255, 255, 0.06);
            --sidebar-active: rgba(255, 255, 255, 0.12);
        }

        body {

            margin: 0;

            background: var(--page-bg);

            color: var(--text-main);

            font-family: Inter, system-ui, sans-serif;
        }

        a {
            text-decoration: none;
        }

        .layout-wrapper {

            display: flex;

            min-height: 100vh;
        }

        .sidebar {

            width: var(--sidebar-width);

            background: var(--sidebar-bg);

            color: white;

            position: fixed;

            top: 0;
            left: 0;
            bottom: 0;

            z-index: 1000;

            display: flex;

            flex-direction: column;

            padding: 20px 16px;

            box-shadow: var(--shadow-md);
        }

        .sidebar-brand {

            display: flex;

            align-items: center;

            gap: 12px;

            margin-bottom: 40px;

            padding: 0 8px;
        }

        .brand-logo {

            width: 50px;
            height: 50px;

            border-radius: 16px;

            background: linear-gradient(135deg, #2563eb, #1d4ed8);

            display: flex;

            align-items: center;

            justify-content: center;

            font-size: 26px;

            color: white;

            box-shadow: 0 10px 24px rgba(37, 99, 235, .35),
            inset 0 1px 1px rgba(255, 255, 255, .15);
        }

        .brand-title {

            font-size: 20px;

            font-weight: 700;

            letter-spacing: .4px;
        }

        .brand-subtitle {

            font-size: 12px;

            opacity: .7;

            margin-top: -2px;
        }

        .sidebar-section-title {

            font-size: 11px;

            text-transform: uppercase;

            letter-spacing: 1px;

            color: rgba(255, 255, 255, .5);

            margin: 18px 10px 10px;
        }

        .sidebar-menu {

            display: flex;

            flex-direction: column;

            gap: 6px;
        }

        .sidebar-link {

            display: flex;

            align-items: center;

            gap: 14px;

            padding: 11px 13px;

            border-radius: 14px;

            color: rgba(255, 255, 255, .82);

            transition: .2s ease;
        }

        .sidebar-link i {

            font-size: 18px;

            min-width: 20px;
        }

        .sidebar-link:hover {

            background: var(--sidebar-hover);

            color: white;

            transform: translateX(3px);
        }

        .sidebar-link.active {

            background: linear-gradient(135deg, rgba(37, 99, 235, .28), rgba(37, 99, 235, .18));

            color: white;

            font-weight: 600;

            border: 1px solid rgba(255, 255, 255, .08);

            box-shadow: inset 0 1px 0 rgba(255, 255, 255, .06),
            0 6px 18px rgba(0, 0, 0, .12);
        }

        .main-content {

            margin-left: var(--sidebar-width);

            width: calc(100% - var(--sidebar-width));

            min-height: 100vh;

            display: flex;

            flex-direction: column;
        }

        .topbar {
            height: 70px;
            background: var(--topbar-bg, rgba(255, 255, 255, .72));
            backdrop-filter: blur(18px);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 28px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 1px 0 rgba(255, 255, 255, .04);
        }

        .topbar-left h4 {

            margin: 0;

            font-weight: 700;

            font-size: 22px;
        }

        .topbar-left p {

            margin: 0;

            color: var(--text-muted);

            font-size: 14px;
        }

        .topbar-right {

            display: flex;

            align-items: center;

            gap: 14px;
        }

        .topbar-icon {

            width: 42px;
            height: 42px;

            border-radius: 12px;

            background: var(--page-bg);

            border: 1px solid var(--border-color);

            display: flex;

            align-items: center;

            justify-content: center;

            cursor: pointer;

            transition: .2s;
        }

        .topbar-icon:hover {

            transform: translateY(-2px);
        }

        .user-box {

            display: flex;

            align-items: center;

            gap: 12px;

            padding: 8px 12px;

            border-radius: 14px;

            background: var(--page-bg);

            border: 1px solid var(--border-color);
        }

        .user-avatar {

            width: 38px;
            height: 38px;

            border-radius: 12px;

            background: linear-gradient(135deg, #2563eb, #1d4ed8);

            color: white;

            display: flex;

            align-items: center;

            justify-content: center;

            font-weight: 700;
        }

        .user-meta {

            line-height: 1.2;
        }

        .user-meta strong {

            display: block;

            font-size: 14px;
        }

        .user-meta span {

            font-size: 12px;

            color: var(--text-muted);
        }

        .page-content {

            padding: 24px;
        }

        .card {

            background: var(--card-bg);

            border: 1px solid rgba(255, 255, 255, .08);

            border-radius: 22px;

            box-shadow: 0 10px 30px rgba(15, 23, 42, .06),
            0 2px 8px rgba(15, 23, 42, .04);

            overflow: hidden;

            transition: .2s ease;
            transform: translateY(0);
        }

        .card:hover {

            transform: translateY(-2px);

            box-shadow: 0 18px 38px rgba(15, 23, 42, .08),
            0 4px 12px rgba(15, 23, 42, .05);
        }

        .card-header {

            background: transparent !important;

            border-bottom: 1px solid var(--border-color);

            padding: 18px 22px;

            font-weight: 600;
        }

        .table {

            margin: 0;
        }

        .table thead th {

            font-size: 13px;

            text-transform: uppercase;

            letter-spacing: .4px;

            color: var(--text-muted);

            border-bottom-width: 1px;

            padding: 16px;
        }

        .table tbody td {
            font-size: 14px;
            padding: 16px;

            vertical-align: middle;

            border-color: var(--border-color);
        }

        .table tbody tr {
            transition: .15s ease;
        }

        .table-hover tbody tr:hover {

            background: rgba(59, 130, 246, .04);
        }

        .btn {
            transition: .18s ease;
            border-radius: 12px;

            padding: 10px 16px;

            font-weight: 500;
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .btn-primary {

            background: var(--primary-color);

            border-color: var(--primary-color);
        }

        .btn-primary:hover {

            background: var(--primary-dark);

            border-color: var(--primary-dark);
        }

        .form-control,
        .form-select {

            border-radius: 12px;

            border: 1px solid var(--border-color);

            padding: 12px 14px;

            background: var(--card-bg);

            color: var(--text-main);
        }

        .form-control:focus,
        .form-select:focus {

            box-shadow: 0 0 0 4px rgba(37, 99, 235, .1);

            border-color: #2563eb;
        }

        .mobile-toggle {

            display: none;
        }

        @media (max-width: 992px) {

            .sidebar {

                transform: translateX(-100%);

                transition: .3s;

                width: 280px;
            }

            .sidebar.show {

                transform: translateX(0);
            }

            .main-content {

                width: 100%;

                margin-left: 0;
            }

            .mobile-toggle {

                display: flex;
            }

            .topbar {

                padding: 0 16px;
                box-shadow: 0 1px 0 rgba(255, 255, 255, .04);
            }

            .page-content {

                padding: 20px;
            }
        }

    </style>

</head>

<body>

<div class="layout-wrapper">

    <!-- SIDEBAR -->

    <aside class="sidebar"
           id="sidebar">

        <div class="sidebar-brand">

            <div class="brand-logo">

                <i class="bi bi-link-45deg"></i>

            </div>

            <div>

                <div class="brand-title">
                    СИНХРА
                </div>

            </div>

        </div>

        <div class="sidebar-section-title">
            Навигация
        </div>

        <div class="sidebar-menu">

            <a class="sidebar-link {% if request.path == '/' %}active{% endif %}"
               href="/">

                <i class="bi bi-grid-1x2-fill"></i>
                <span>Панель управления</span>

            </a>

            <a class="sidebar-link {% if '/products/' in request.path %}active{% endif %}"
               href="/products/">

                <i class="bi bi-link-45deg"></i>
                <span>Товары</span>

            </a>

            <a class="sidebar-link {% if '/orders/' in request.path %}active{% endif %}"
               href="/orders/">

                <i class="bi bi-cart-check"></i>
                <span>Заказы</span>

            </a>

            <a class="sidebar-link {% if '/deliveries/' in request.path %}active{% endif %}"
               href="/deliveries/">

                <i class="bi bi-truck"></i>
                <span>Доставки</span>

            </a>

            <a class="sidebar-link {% if '/documents/' in request.path %}active{% endif %}"
               href="/documents/">

                <i class="bi bi-file-earmark-text"></i>
                <span>Документы</span>

            </a>
            <a class="sidebar-link {% if '/profile/' in request.path %}active{% endif %}"
               href="/profile/">

                <i class="bi bi-person-circle"></i>
                <span>Профиль</span>

            </a>
        </div>

        <div class="mt-auto pt-4">

            <a href="/logout/"
               class="sidebar-link">

                <i class="bi bi-box-arrow-right"></i>
                <span>Выход</span>

            </a>

        </div>

    </aside>

    <!-- MAIN -->

    <main class="main-content">

        <!-- TOPBAR -->

        <div class="topbar">

            <div class="d-flex align-items-center gap-3">

                <button class="topbar-icon mobile-toggle"
                        id="sidebarToggle">

                    <i class="bi bi-list"></i>

                </button>

                <div class="topbar-left"></div>
            </div>

            <div class="topbar-right">

                <div class="topbar-icon"
                     id="themeToggle">

                    <i class="bi bi-moon-stars"></i>

                </div>

                <div class="topbar-icon">

                    <i class="bi bi-bell"></i>

                </div>

                {% if request.user.is_authenticated %}

                <div class="user-box">

                    <div class="user-avatar">

                        {{ request.user.username|first|upper }}

                    </div>

                    <div class="user-meta">

                        <strong>
                            {{ request.user.username }}
                        </strong>

                        <span>
                            {{ request.user.get_role_display }}
                        </span>

                    </div>

                </div>

                {% endif %}

            </div>

        </div>

        <!-- PAGE -->

        <div class="page-content">

            {% block content %}
            {% endblock %}

        </div>

    </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

    (function () {

        const html = document.documentElement;

        const themeToggle = document.getElementById('themeToggle');

        function setTheme(theme) {

            html.setAttribute('data-bs-theme', theme);

            localStorage.setItem('theme', theme);
        }

        const savedTheme = localStorage.getItem('theme') || 'light';

        setTheme(savedTheme);

        themeToggle.addEventListener('click', () => {

            const current = html.getAttribute('data-bs-theme');

            setTheme(current === 'light' ? 'dark' : 'light');
        });

    })();

    const sidebar = document.getElementById('sidebar');

    const sidebarToggle = document.getElementById('sidebarToggle');

    sidebarToggle?.addEventListener('click', () => {

        sidebar.classList.toggle('show');

    });

</script>

</body>

</html>
