services:
  - type: web
    name: podrucny
    runtime: python
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "gunicorn podrucny.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: podrucny-db
          property: connectionString

databases:
  - name: podrucny-db